# GoWithSally Redis Configuration

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Security
requirepass sally_redis_2024
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence - AOF (Append Only File)
appendonly yes
appendfsync everysec
appendfilename "gowithsally.aof"
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Persistence - RDB Snapshots
save 900 1
save 300 10
save 60 10000
dbfilename gowithsally.rdb
dir /data
rdbcompression yes
rdbchecksum yes

# Logging
loglevel notice
logfile ""

# Clients
maxclients 1000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Lua
lua-time-limit 5000

# Pub/Sub
notify-keyspace-events "Ex"

# Latency
latency-monitor-threshold 100

# Active defrag
activedefrag yes
active-defrag-enabled yes
