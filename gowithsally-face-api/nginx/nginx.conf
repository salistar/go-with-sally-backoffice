events {
    worker_connections 1024;
}

http {
    # --- Upstream: API instances -----------------------------------------------
    upstream face_api {
        least_conn;
        server api:8000;
        # When scaled: docker compose up --scale api=3
        # Docker DNS resolves "api" to all replicas automatically
    }

    # --- Rate limiting ---------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;

    # --- Request size (images can be large) ------------------------------------
    client_max_body_size 50M;

    # --- Gzip ------------------------------------------------------------------
    gzip on;
    gzip_types application/json text/plain text/html text/css;
    gzip_min_length 256;

    # --- Server ----------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check (no rate limit)
        location /api/health {
            proxy_pass http://face_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API endpoints (rate limited)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://face_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for AI inference
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Upload endpoints (stricter rate limit)
        location ~ ^/api/(detect|recognize|compare|gender|antispoof|age|analyze|voice-gender|count-faces|detect-heads|driver-verify|passenger-verify) {
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass http://face_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Web UI
        location / {
            proxy_pass http://face_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prometheus metrics (internal only in production)
        location /metrics {
            proxy_pass http://face_api;
            # In prod, restrict to internal IPs:
            # allow 10.0.0.0/8;
            # deny all;
        }
    }
}
