---
all:
  children:
    local:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3

    staging:
      hosts:
        staging-server:
          ansible_host: staging.gowithsally.ma
          ansible_user: deploy
          ansible_port: 22
          ansible_python_interpreter: /usr/bin/python3
          environment: staging
          app_port: 3000

    production:
      hosts:
        prod-app-1:
          ansible_host: app1.gowithsally.ma
          ansible_user: deploy
          ansible_port: 22
          ansible_python_interpreter: /usr/bin/python3
          environment: production
          app_port: 3000
          server_role: app

        prod-app-2:
          ansible_host: app2.gowithsally.ma
          ansible_user: deploy
          ansible_port: 22
          ansible_python_interpreter: /usr/bin/python3
          environment: production
          app_port: 3000
          server_role: app

        prod-db:
          ansible_host: db.gowithsally.ma
          ansible_user: deploy
          ansible_port: 22
          ansible_python_interpreter: /usr/bin/python3
          environment: production
          server_role: database

      children:
        app_servers:
          hosts:
            prod-app-1:
            prod-app-2:

        database_servers:
          hosts:
            prod-db:

  vars:
    ansible_become: yes
    ansible_become_method: sudo
    deploy_user: deploy
    app_user: gowithsally
    app_group: gowithsally
    app_home: /home/gowithsally
    app_dir: /home/gowithsally/app
    backup_dir: /backups
    log_dir: /var/log/gowithsally
