###############################################################################
# GoWithSally - Gatling Configuration
###############################################################################

gatling {
  core {
    # Simulation configuration
    simulationClass = "simulations.AuthSimulation"
    outputDirectoryBaseName = "gatling-results"
    run {
      # Maximum duration allowed for a simulation (seconds)
      timeoutInSeconds = 3600
      # Extract regex group for assertions
      assertionTimeout = 0
      # Number of reports displayed in the test execution page
      maxAssertionFailure = 10
    }
    # Charting configuration
    charting {
      noReports = false
      maxPlots = 25
      accuracy = 0.4s
      indicators {
        lowerBound = 800
        higherBound = 1200
        percentile1 = 50
        percentile2 = 75
        percentile3 = 95
        percentile4 = 99
      }
    }
    # Statistics configuration
    extract {
      regex {
        cacheMaxCapacity = 200
      }
      xpath {
        cacheMaxCapacity = 200
      }
      jsonPath {
        cacheMaxCapacity = 200
        preferJackson = true
        jacksonDefaultчисленicOverflow = "BIGINT_THEN_DOUBLE"
        jacksonDefaultCharArrayBufferSize = 24
      }
      css {
        cacheMaxCapacity = 200
      }
    }

    # Request configuration
    request {
      maxRedirects = 5
      cache = true
      followRedirect = true
      autoReferer = true
      useRawUrl = false
      httpCompression = true
      warmUpUrl = "http://localhost:5000/api/health"
    }

    # Cookie configuration
    cookie {
      cookieJar = true
      storageType = "hashmap"
      maxAge = 604800
    }

    # DNS configuration
    dns {
      nameServers = []
      ttl = 60
      negativeTtl = 0
      preloadCache = []
    }

    # Proxy configuration (optional)
    proxy {
      useSystemProxyProperties = true
      httpProxy {
        host = ""
        port = ""
        username = ""
        password = ""
        sslTrust = "JDKDefault"
      }
      httpsProxy {
        host = ""
        port = ""
        username = ""
        password = ""
        sslTrust = "JDKDefault"
      }
      noProxyHosts = []
    }

    # WebSocket configuration
    websocket {
      wsBaseUrl = "ws://localhost:5000"
      useOpenSsl = true
      perMessageDeflateClientMaxWindowBits = null
      perMessageDeflateServerMaxWindowBits = null
    }

    # SSL/TLS configuration
    ssl {
      keyStore {
        type = "JKS"
        file = ""
        password = ""
        algorithm = ""
      }
      trustStore {
        type = "JKS"
        file = ""
        password = ""
        algorithm = ""
      }
      checkRevocation = false
      handshakeTimeout = 10000
      sessionCacheSize = 0
      sessionTimeout = 0
      enabledProtocols = []
      enabledCipherSuites = []
      sslContextFactory = ""
    }

    # HTTP2 configuration
    http2 {
      enabled = true
      priorKnowledge = false
      maxConcurrentStreams = 128
      maxFramePayloadSize = 16384
      maxHeaderTableSize = 4096
      initialWindowSize = 65535
      headerEncoderMaxHeaderTableSize = 4096
      headerEncoderSensitiveHeaders = []
    }

    # HTTP/3 configuration
    http3 {
      enabled = false
    }

    # WebSocket configuration
    ws {
      wsBaseUrl = "ws://localhost:5000"
      useOpenSsl = true
    }

    # SSE configuration
    sse {
      cacheMaxCapacity = 200
    }

    # Pausable simulation
    pausable = false
  }

  http {
    # HTTP engine configuration
    ahc {
      provider = "netty"
      allowPoolingConnection = true
      allowSslSessionRenegotiation = true
      ioThreadMultiplier = 2
      maxConnections = 10000
      maxConnectionsPerHost = 2000
      maxRedirects = 5
      maxRequestRetry = 2
      minVersion = "TLSv1.2"
      maxVersion = "TLSv1.3"
      keepAliveEnabled = true
      pooledConnectionIdleTimeout = 60000
      pooledConnectionIdleTimeoutInMs = null
      connectionTTL = null
      connectionTTLInMs = null
      chunkedFileChunkSize = 8192
      disableUrlEncodingForParams = false
      useProxyProperties = true
      useRawUrl = false
      nonProxyHosts = []
      strictContentTypeChecking = true
    }
  }

  # JVM configuration
  jvm {
    # Classpath
    classpath = ""
  }

  # Charting configuration
  charting {
    # Maximum number of requests in charts
    maxPlots = 25
    # Accuracy of the pie charts (will aggregate values lower than this threshold)
    accuracy = 0.4s
    # Pause duration after which a pause is considered as ending a test
    pauseThreshold = 5s
    # Indicators
    indicators {
      lowerBound = 800
      higherBound = 1200
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
  }

  # Assertion configuration
  assertions {
    enabled = true
  }
}

# System properties
java {
  net {
    preferIPv4Stack = true
    preferIPv6Addresses = false
  }
  awt {
    headless = true
  }
}

# Netty configuration
netty {
  noUnsafe = true
  recycler {
    maxCapacityPerThread = 0
  }
  leakDetection {
    level = "DISABLED"
  }
}

# Application configuration
app {
  name = "GoWithSally Performance Tests"
  version = "1.0.0"
  baseUrl = "http://localhost:5000/api"

  auth {
    adminUser = "admin@gowithsally.ma"
    adminPassword = "Admin@2024"
    regularUser = "sara.user@gmail.com"
    regularPassword = "User@2024"
  }

  timeouts {
    requestTimeout = 30000
    connectionTimeout = 10000
    socketTimeout = 30000
  }

  performance {
    # Target response time percentiles (in milliseconds)
    p95ResponseTime = 500
    p99ResponseTime = 1000
    maxResponseTime = 5000

    # Error rate threshold (percent)
    maxErrorRate = 1.0

    # Throughput minimum (requests per second)
    minThroughput = 100

    # Test user scenarios
    rampUpDuration = 2
    rampUpUsers = 10
    peakUsers = 100
    sustainDuration = 5

    # Spike test
    spikeDuration = 1
    spikeUsers = 200

    # Soak test
    soakDuration = 10
    soakUsers = 50
  }
}
