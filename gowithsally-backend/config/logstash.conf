input {
  tcp {
    port => 5044
    codec => json_lines
  }
  beats {
    port => 5045
  }
}

filter {
  if [service] == "gowithsally-backend" {
    mutate {
      add_field => { "[@metadata][index]" => "gws-backend" }
    }
  }
  if [service] == "gowithsally-face-api" {
    mutate {
      add_field => { "[@metadata][index]" => "gws-face-api" }
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Default index if service not matched
  if ![@metadata][index] {
    mutate {
      add_field => { "[@metadata][index]" => "gws-logs" }
    }
  }

  # Add processing metadata
  mutate {
    add_field => { "[@metadata][processed]" => true }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
    action => "create"
  }

  # Optional: stdout for debugging
  # stdout { codec => rubydebug }
}
