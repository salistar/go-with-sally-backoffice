# GoWithSally MongoDB Configuration
storage:
  dbPath: /data/db
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 1
    collectionConfig:
      blockCompressor: snappy

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log
  verbosity: 0

net:
  port: 27017
  bindIp: 0.0.0.0
  maxIncomingConnections: 200

operationProfiling:
  slowOpThresholdMs: 100
  mode: slowOp

security:
  authorization: enabled

replication:
  oplogSizeMB: 512
