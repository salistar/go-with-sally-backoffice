version: '3.8'

services:
  mongodb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gowithsally-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-gowithsally_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-sally_secure_2024}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-gowithsally}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./backups:/backups
      - ./scripts:/scripts
    networks:
      - gowithsally-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  mongo-express:
    image: mongo-express:1.0
    container_name: gowithsally-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-gowithsally_admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-sally_secure_2024}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-gowithsally_admin}:${MONGO_ROOT_PASSWORD:-sally_secure_2024}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-sally2024}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    networks:
      - gowithsally-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  gowithsally-network:
    driver: bridge
    name: gowithsally-network
