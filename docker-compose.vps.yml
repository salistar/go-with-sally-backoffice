##############################################################################
# Go With Sally - Backoffice - PRODUCTION (SERVEUR 2 DEDIE)
#
# VPS dedie : gowithsally-prod (88.198.205.229, CPX52 12 vCPU / 24 GB).
# Stack AUTONOME : Mongo + Redis DEDIES (conteneurs + volumes propres),
# backend + web (images GHCR), Caddy (reverse-proxy + TLS Let's Encrypt auto).
#
# Domaine : gowithsally.com
#   https://gowithsally.com       -> web      (Caddy -> web:80)
#   https://api.gowithsally.com   -> backend  (Caddy -> backend:5000)
#
# Deploiement : CI deploy-prod.yml (local -> GitHub -> Actions -> ce VPS)
##############################################################################

name: gowithsally

x-logging: &log
  driver: json-file
  options: { max-size: "50m", max-file: "5" }

networks:
  gws-net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  backend_uploads:
  backend_logs:
  caddy_data:
  caddy_config:
  face_models:
    # Provisionne par le CI (deploy-prod.yml) AVANT 'up' : modeles ML
    # telecharges depuis la GitHub Release 'models-v1' du repo backoffice.
    name: gowithsally_face_models
    external: true

services:
  # ========== MONGODB (dedie) ==========
  mongo:
    image: mongo:7
    container_name: gws-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-gws}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: gowithsally
    volumes:
      - mongo_data:/data/db
    networks: [gws-net]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *log

  # ========== REDIS (dedie) ==========
  redis:
    image: redis:7-alpine
    container_name: gws-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [gws-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *log

  # ========== BACKEND API (api.gowithsally.com) ==========
  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-salistar}/gws-backend:${IMAGE_TAG:-latest}
    container_name: gws-backend
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      TRUST_PROXY: "true"
      MONGODB_URI: mongodb://${MONGO_USER:-gws}:${MONGO_PASSWORD}@mongo:27017/gowithsally?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      APP_URL: https://api.gowithsally.com
      FRONTEND_URL: https://gowithsally.com
      CORS_ORIGINS: "https://gowithsally.com,https://api.gowithsally.com"
    expose: ["5000"]
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks: [gws-net]
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      # node present dans l'image backend -> fiable (busybox wget faux-negatif)
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    logging: *log
    deploy:
      resources:
        limits: { cpus: '3', memory: 3G }
        reservations: { cpus: '1', memory: 768M }

  # ========== WEB FRONTEND (gowithsally.com) ==========
  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-salistar}/gws-web:${IMAGE_TAG:-latest}
    container_name: gws-web
    restart: always
    expose: ["80"]
    networks: [gws-net]
    depends_on: [backend]
    healthcheck:
      # /health = endpoint dedie (curl present dans l'image web) -> fiable
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging: *log

  # ========== FACE AI (ai.gowithsally.com) ==========
  face-api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-salistar}/gws-face-api:${IMAGE_TAG:-latest}
    container_name: gws-face-api
    restart: always
    env_file: .env.production
    environment:
      APP_ENV: production
      PORT: 8000
      WORKERS: ${FACE_API_WORKERS:-2}
      LOG_LEVEL: info
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      CORS_ORIGINS: "*"
    expose: ["8000"]
    volumes:
      - face_models:/app/models:ro
    networks: [gws-net]
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health/ping\")' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    logging: *log
    deploy:
      resources:
        limits: { cpus: '4', memory: 6G }
        reservations: { cpus: '1', memory: 1G }

  # ========== CADDY (reverse-proxy + TLS Let's Encrypt automatique) ==========
  caddy:
    image: caddy:2-alpine
    container_name: gws-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [gws-net]
    depends_on: [web, backend]
    logging: *log
