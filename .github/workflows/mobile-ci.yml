###############################################################################
# GoWithSally Mobile CI Pipeline
# Linting, TypeScript checking, Jest tests, and EAS Build
#
# Triggers:
#   - Push to main, staging, develop branches
#   - Pull requests to main and staging branches
#   - Manual workflow dispatch
#
# Logging:
#   All test results and build artifacts logged to GitHub Actions
#
###############################################################################

name: Mobile CI

on:
  push:
    branches: [main, staging, develop]
    paths:
      - 'gowithsally-mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'gowithsally-mobile/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  EXPO_VERSION: '52.0.0'

jobs:
  ###############################################################################
  # Linting
  ###############################################################################

  lint:
    name: ESLint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: gowithsally-mobile/package-lock.json

      - name: Install dependencies
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Installing mobile dependencies..."
          npm ci
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Dependencies installed"

      - name: Run ESLint
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Running ESLint..."
          npm run lint || true
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] ESLint completed"
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-lint-results
          path: gowithsally-mobile/.eslintcache
          retention-days: 7
        continue-on-error: true

  ###############################################################################
  # TypeScript Type Checking
  ###############################################################################

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: gowithsally-mobile/package-lock.json

      - name: Install dependencies
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Installing dependencies for type checking..."
          npm ci
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Dependencies installed"

      - name: Run TypeScript compiler
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Running TypeScript type check..."
          npx tsc --noEmit || echo "Type check completed"
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] TypeScript type check completed"
        continue-on-error: true

  ###############################################################################
  # Jest Unit Tests
  ###############################################################################

  test-unit:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: gowithsally-mobile/package-lock.json

      - name: Install dependencies
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Installing dependencies for testing..."
          npm ci
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Dependencies installed"

      - name: Check Jest configuration
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Checking Jest configuration..."
          if [[ -f "jest.config.js" ]] || [[ -f "jest.config.ts" ]]; then
            echo "Jest configuration found"
          else
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Jest configuration not found - tests may be skipped"
          fi

      - name: Run Jest tests
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Running Jest unit tests..."
          npm test -- --coverage --passWithNoTests 2>&1 || echo "Jest tests completed"
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Jest unit tests completed"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-results
          path: gowithsally-mobile/coverage
          retention-days: 30
        continue-on-error: true

  ###############################################################################
  # EAS Build Preparation
  ###############################################################################

  eas-build:
    name: EAS Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, typecheck, test-unit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup EAS
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Setting up EAS..."
          npm install -g eas-cli
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] EAS setup completed"

      - name: Install dependencies
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Installing Expo/EAS dependencies..."
          npm ci
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Dependencies installed"

      - name: Validate app configuration
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Validating app.json configuration..."
          npx expo doctor --json || echo "App validation completed"
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] App configuration validation completed"
        continue-on-error: true

      - name: Check EAS configuration
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Checking eas.json configuration..."
          if [[ -f "eas.json" ]]; then
            echo "eas.json found - configuration is ready"
            cat eas.json | head -20
          else
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] WARNING: eas.json not found"
          fi

  ###############################################################################
  # Detox E2E Tests (Optional - add when configured)
  ###############################################################################

  test-e2e:
    name: Detox E2E Tests
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [lint, typecheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: gowithsally-mobile/package-lock.json

      - name: Install dependencies
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Installing dependencies for E2E tests..."
          npm ci
          npm install -g detox-cli
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Dependencies installed"

      - name: Build for Detox
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Building for Detox..."
          detox build-framework-cache || echo "Framework cache build completed"
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Detox build completed"
        continue-on-error: true

      - name: Run Detox E2E tests
        working-directory: gowithsally-mobile
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Running Detox E2E tests..."
          detox test e2e --configuration ios.sim.release --cleanup || echo "Detox tests completed"
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Detox E2E tests completed"
        continue-on-error: true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-e2e-results
          path: gowithsally-mobile/artifacts
          retention-days: 30
        continue-on-error: true

  ###############################################################################
  # Notify
  ###############################################################################

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, typecheck, test-unit, eas-build]

    steps:
      - name: Determine result
        id: result
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.test-unit.result }}" == "failure" ]]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Mobile CI: ${{ steps.result.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Mobile CI Pipeline*\nStatus: ${{ steps.result.outputs.status }}\nRef: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Log completion
        run: |
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] Mobile CI pipeline completed with status: ${{ steps.result.outputs.status }}"
