##############################################################################
# Go With Sally - Backoffice - Deploiement PRODUCTION (methode SallyCards)
#
# Reprend le pipeline sallycards-backoffice/deploy-prod.yml :
#   build images -> GHCR -> SSH VPS -> docker compose pull+up -> CF purge
#   -> health-check des endpoints publics.
#
# IMPORTANT : declenche UNIQUEMENT a la main (workflow_dispatch).
# Tant qu'on ne le lance pas depuis l'onglet Actions, RIEN ne touche le VPS
# de production SallyCards. (Decision : "STOP avant le VPS".)
#
# Secrets requis (repo > Settings > Secrets and variables > Actions) :
#   VPS_HOST       91.99.70.43
#   VPS_USER       deploy
#   VPS_SSH_KEY    (cle privee SSH deploy@VPS)
#   CF_ZONE_ID     (optionnel — purge cache Cloudflare)
#   CF_API_TOKEN   (optionnel — purge cache Cloudflare)
# (Le push GHCR utilise GITHUB_TOKEN ; images publiques -> pull VPS sans PAT.)
##############################################################################
name: Deploy Prod (VPS)

on:
  workflow_dispatch:
    inputs:
      with_elk:
        description: "Inclure la stack ELK (RAM!)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: salistar

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gws-backend
            context: ./gowithsally-backend
            file: ./gowithsally-backend/Dockerfile
            target: production
          - name: gws-web
            context: ./gowithsally-web
            file: ./gowithsally-web/Dockerfile
            target: ""
          - name: gws-face-api
            context: ./gowithsally-face-api
            file: ./gowithsally-face-api/Dockerfile
            target: production
            # Modeles ML hors image : provisionnes sur le VPS depuis la
            # GitHub Release models-v1 par le job 'deploy' avant 'up'.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: SSH deploy sur le VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,SHA
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            APP=~/apps/go-with-sally-backoffice
            if [ ! -d "$APP/.git" ]; then
              git clone https://github.com/salistar/go-with-sally-backoffice.git "$APP"
            fi
            cd "$APP"
            git fetch origin main
            git reset --hard origin/main
            if [ ! -f .env.production ]; then
              echo "ERREUR: .env.production absent sur le VPS (prerequis non fait)"; exit 1
            fi
            export IMAGE_TAG="$SHA"
            # ---- Provisioning modeles ML face-api (GitHub Release models-v1) ----
            REL="https://github.com/salistar/go-with-sally-backoffice/releases/download/models-v1"
            docker volume create gowithsally_face_models >/dev/null
            if [ -z "$(docker run --rm -v gowithsally_face_models:/m alpine sh -c 'ls -A /m 2>/dev/null')" ]; then
              echo ">> Modeles absents - telechargement depuis Release models-v1"
              tmp=$(mktemp -d)
              for m in age antispoof face facecount gender headcount voice_gender; do
                echo "   - $m.tar.gz"; curl -fsSL --retry 4 -o "$tmp/$m.tar.gz" "$REL/$m.tar.gz"
              done
              docker run --rm -v gowithsally_face_models:/models -v "$tmp":/src alpine \
                sh -c 'cd /models && for f in /src/*.tar.gz; do tar xzf "$f"; done && ls -1 /models'
              rm -rf "$tmp"
            else
              echo ">> Modeles deja presents dans le volume - skip"
            fi
            # SERVEUR 2 DEDIE : stack complete = mongo + redis + backend +
            # web + face-api + caddy (TLS auto).
            docker compose --env-file .env.production -f docker-compose.vps.yml pull backend web face-api
            docker compose --env-file .env.production -f docker-compose.vps.yml up -d
            docker image prune -f
            docker compose --env-file .env.production -f docker-compose.vps.yml ps

  cloudflare-purge:
    needs: deploy
    runs-on: ubuntu-22.04
    steps:
      - name: Purge cache Cloudflare (si configure)
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "Secrets Cloudflare absents -> purge ignoree."; exit 0
          fi
          curl -fsSL -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  health-check:
    needs: deploy
    runs-on: ubuntu-22.04
    steps:
      - name: Health-check local sur le VPS (backend + web)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "--- conteneurs ---"
            docker ps --filter name=gws- --format "{{.Names}} | {{.Status}}"
            echo "--- backend /health (interne) ---"
            docker exec gws-backend wget -qO- http://localhost:5000/health && echo
            echo "--- web (interne) ---"
            docker exec gws-caddy wget -qO- http://web:80/ | grep -o 'Go With Sally' | head -n1 || true
            echo "Health-check OK (TLS public via Caddy/Let's Encrypt - DNS gowithsally.com requis)"
