##############################################################################
# ONE-SHOT — Purge GoWithSally du SERVEUR 1 (SallyCards prod, 91.99.70.43)
#
# Supprime UNIQUEMENT les artefacts GoWithSally ajoutes lors du 1er deploiement.
# SallyCards (conteneurs sallycards-*, base 'sallycards', reseau, tunnel) =
# STRICTEMENT INTACT. A lancer manuellement TANT QUE les secrets pointent
# encore vers le serveur 1 (VPS_HOST=91.99.70.43, ancienne cle SSH).
##############################################################################
name: Purge Server1 (GoWithSally)

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-22.04
    steps:
      - name: SSH purge serveur 1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "15m"
          script: |
            set -e
            echo "=== Cible: $(hostname) ($(whoami)) ==="
            APP=~/apps/go-with-sally-backoffice

            echo "--- [1] Arret + suppression conteneurs/reseau GoWithSally ---"
            if [ -d "$APP" ]; then
              cd "$APP"
              docker compose --env-file .env.production -f docker-compose.vps.yml down --remove-orphans || true
              cd ~
            fi
            for c in gws-backend gws-web gws-face-api gws-mongo gws-redis; do
              docker rm -f "$c" 2>/dev/null || true
            done
            docker network rm gowithsally_gws-net gws-net 2>/dev/null || true

            echo "--- [2] Suppression images GoWithSally ---"
            docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' | grep -i 'gws-\|go-with-sally' | awk '{print $2}' | sort -u | xargs -r docker rmi -f 2>/dev/null || true

            echo "--- [3] DROP base 'gowithsally' dans le conteneur sallycards-mongo ---"
            SC=~/apps/sallycards-backoffice/.env.production
            MP="$(grep -E '^MONGO_PASSWORD=' "$SC" | head -1 | cut -d= -f2-)"
            if [ -n "$MP" ]; then
              docker exec sallycards-mongo mongosh -u sallycards -p "$MP" --authenticationDatabase admin --quiet --eval '
                var before = db.adminCommand({listDatabases:1}).databases.map(d=>d.name);
                db.getSiblingDB("gowithsally").dropDatabase();
                var after = db.adminCommand({listDatabases:1}).databases.map(d=>d.name);
                print("AVANT: " + before.join(","));
                print("APRES: " + after.join(","));
              '
            else
              echo "!! MONGO_PASSWORD introuvable - DROP manuel requis"
            fi

            echo "--- [4] Flush cache Redis DB 3 (gowithsally) dans sallycards-redis ---"
            docker exec sallycards-redis redis-cli -n 3 FLUSHDB || true

            echo "--- [5] Nettoyage ingress cloudflared (gowithsally.salistar.com + apigowithsally.salistar.com) ---"
            CFG=/etc/cloudflared/config.yml
            if sudo grep -q "gowithsally" "$CFG"; then
              sudo cp "$CFG" "$CFG.prepurge.$(date +%s)"
              sudo awk '
                /- hostname: (api)?gowithsally\.salistar\.com/ { skip=2; next }
                skip>0 { skip--; next }
                { print }
              ' "$CFG" | sudo tee "$CFG.tmp" >/dev/null && sudo mv "$CFG.tmp" "$CFG"
              sudo cloudflared --config "$CFG" tunnel ingress validate && sudo systemctl restart cloudflared
              echo "ingress restant:"; sudo grep -nE "hostname:|http_status:404" "$CFG"
            else
              echo "aucune entree gowithsally dans cloudflared (deja propre)"
            fi
            # nettoie aussi le ~/.cloudflared/config.yml (non utilise par le service)
            if [ -f ~/.cloudflared/config.yml ] && grep -q gowithsally ~/.cloudflared/config.yml; then
              cp ~/.cloudflared/config.yml ~/.cloudflared/config.yml.prepurge
              awk '/- hostname: (api)?gowithsally\.salistar\.com/{s=2;next} s>0{s--;next} {print}' ~/.cloudflared/config.yml.prepurge > ~/.cloudflared/config.yml
            fi

            echo "--- [6] Suppression repo + env GoWithSally ---"
            rm -rf "$APP"

            echo "--- [7] VERIFICATION SallyCards intact ---"
            docker ps --filter name=sallycards- --format "{{.Names}} | {{.Status}}"
            echo "API SallyCards locale:"; curl -fsS -m 8 http://127.0.0.1:3000/api/v1/health || echo "(verifier)"
            echo "=== PURGE SERVEUR 1 TERMINEE ==="
