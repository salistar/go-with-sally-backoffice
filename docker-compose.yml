##############################################################################
# GoWithSally - Full Stack Docker Compose (Local Development)
#
# LANCER TOUT:  docker compose up -d
#   → MongoDB, Redis, Backend, Face AI, Web, Seed, Admin UIs, ELK
#   → Le seed s'execute automatiquement apres le backend
#
# URLs:
#   Backend API:    http://localhost:5000
#   Web Frontend:   http://localhost:3000
#   Face AI:        http://localhost:8000
#   MongoDB UI:     http://localhost:8081
#   Redis UI:       http://localhost:8082
#   Kibana:         http://localhost:5601
##############################################################################

version: '3.8'

services:
  # ========== DATABASE ==========
  mongodb:
    image: mongo:7.0
    container_name: gws-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-gowithsally_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-sally_secure_2024}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-gowithsally}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./gowithsally-database/init:/docker-entrypoint-initdb.d:ro
      - ./gowithsally-database/scripts:/scripts:ro
    networks:
      - gws-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ========== CACHE ==========
  redis:
    image: redis:7.2-alpine
    container_name: gws-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-sally_redis_2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename "gowithsally.aof"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - gws-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sally_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ========== BACKEND API ==========
  backend:
    build:
      context: ./gowithsally-backend
      dockerfile: Dockerfile
      target: development
    container_name: gws-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      HOST: 0.0.0.0
      SIMULATION_MODE: "true"
      # MongoDB
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-gowithsally_admin}:${MONGO_ROOT_PASSWORD:-sally_secure_2024}@mongodb:27017/${MONGO_DB_NAME:-gowithsally}?authSource=admin
      # Redis
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-sally_redis_2024}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-gws_jwt_secret_dev_2024_change_in_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-30d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-gws_jwt_refresh_dev_2024_change_in_production}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-90d}
      # Face API
      FACE_API_PASSWORD: ${FACE_API_PASSWORD:-sally2024}
      FACE_VERIFICATION_ENABLED: "true"
      FACE_RECOGNITION_THRESHOLD: ${FACE_RECOGNITION_THRESHOLD:-0.75}
      # Google Maps
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # URLs & CORS (lues du .env, localhost en dev, domaines en prod)
      APP_URL: ${APP_URL:-http://localhost:5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:5000/admin}
      FACE_API_URL: http://face-api:8000
      FACE_API_PUBLIC_URL: ${FACE_API_URL:-http://localhost:8000}
      MONGO_EXPRESS_URL: ${MONGO_EXPRESS_URL:-http://localhost:8081}
      REDIS_COMMANDER_URL: ${REDIS_COMMANDER_URL:-http://localhost:8082}
      KIBANA_URL: ${KIBANA_URL:-http://localhost:5601}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://localhost:9200}
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://localhost:5000,http://localhost:8000,http://localhost:8081,http://localhost:8082,http://localhost:19006,exp://localhost:19000}"
      # Email (disabled in dev)
      EMAIL_ENABLED: "false"
      # SMS (disabled in dev)
      SMS_ENABLED: "false"
      # Stripe (disabled in dev)
      STRIPE_ENABLED: "false"
      # Firebase (disabled in dev)
      FIREBASE_ENABLED: "false"
      # Logstash (ELK)
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5044
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./gowithsally-backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - gws-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  # ========== DATABASE SEED (runs once then exits) ==========
  seed:
    build:
      context: ./gowithsally-backend
      dockerfile: Dockerfile
      target: development
    container_name: gws-seed
    restart: "no"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-gowithsally_admin}:${MONGO_ROOT_PASSWORD:-sally_secure_2024}@mongodb:27017/${MONGO_DB_NAME:-gowithsally}?authSource=admin
    command: >
      sh -c "
        echo '⏳ Waiting 5s for backend to be fully ready...' &&
        sleep 5 &&
        echo '🌱 Running database seed with --reset...' &&
        node seeds/fullSeed.js --reset &&
        echo '✅ Seed complete! All test accounts created.' ||
        echo '⚠️ Seed may have partially failed (duplicates are OK)'
      "
    volumes:
      - ./gowithsally-backend:/app
      - /app/node_modules
    networks:
      - gws-network
    depends_on:
      backend:
        condition: service_healthy

  # ========== FACE AI ==========
  face-api:
    build:
      context: ./gowithsally-face-api
      dockerfile: Dockerfile
      target: development
    container_name: gws-face-api
    restart: unless-stopped
    environment:
      PORT: 8000
      APP_PASSWORD: ${FACE_API_PASSWORD:-sally2024}
      APP_ENV: development
      SECRET_KEY: ${FACE_API_SECRET_KEY:-dev-secret-key-change-in-prod}
      WORKERS: ${FACE_API_WORKERS:-1}
      LOG_LEVEL: ${FACE_API_LOG_LEVEL:-info}
      TF_USE_LEGACY_KERAS: "1"
      TF_ENABLE_ONEDNN_OPTS: "0"
      CONF_HIGH: ${FACE_CONF_HIGH:-85.0}
      CONF_LOW: ${FACE_CONF_LOW:-60.0}
      MATCH_STRICT: ${FACE_MATCH_STRICT:-0.45}
      MATCH_NORMAL: ${FACE_MATCH_NORMAL:-0.55}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-sally_redis_2024}@redis:6379/1
      # AI API Keys (from root .env)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      # S3 Storage (optional)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      # Monitoring
      ENABLE_PROMETHEUS: ${ENABLE_PROMETHEUS:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CORS_ORIGINS: "*"
    ports:
      - "${FACE_API_PORT:-8000}:8000"
    volumes:
      - ./gowithsally-face-api/models:/app/models:ro
      - ./gowithsally-face-api/templates:/app/templates:ro
      - ./gowithsally-face-api/static:/app/static:ro
      - ./gowithsally-face-api/app:/app/app:ro
    networks:
      - gws-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health/ping\")' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M

  # ========== WEB FRONTEND ==========
  web:
    build:
      context: ./gowithsally-web
      dockerfile: Dockerfile
    container_name: gws-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3100}:80"
    networks:
      - gws-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ | grep -q 'Go With Sally' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ========== ADMIN UIs ==========
  mongo-express:
    image: mongo-express:1.0
    container_name: gws-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-gowithsally_admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-sally_secure_2024}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-gowithsally_admin}:${MONGO_ROOT_PASSWORD:-sally_secure_2024}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ADMIN_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ADMIN_PASSWORD:-sally2024}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    networks:
      - gws-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gws-redis-commander
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-sally_redis_2024}"
      HTTP_USER: ${ADMIN_USER:-admin}
      HTTP_PASSWORD: ${ADMIN_PASSWORD:-sally2024}
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    networks:
      - gws-network

  # ========== ELK STACK ==========
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: gws-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "false"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - gws-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: gws-logstash
    restart: unless-stopped
    volumes:
      - ./gowithsally-backend/config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    ports:
      - "5044:5044"
      - "5045:5045"
    networks:
      - gws-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: gws-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      # Securite ES desactivee (xpack.security.enabled=false) -> aucun
      # credential. Kibana 8.x interdit le superuser "elastic".
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - gws-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  gws-network:
    driver: bridge
    name: gws-network
