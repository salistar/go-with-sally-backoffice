# SonarQube Configuration for GoWithSally

# Project identification
sonar.projectKey=gowithsally
sonar.projectName=GoWithSally
sonar.projectVersion=1.0.0
sonar.projectDescription=Women-only ride-hailing platform for safe transportation in Morocco

# Source code paths
sonar.sources=gowithsally-backend,gowithsally-mobile,gowithsally-web
sonar.tests=tests

# Backend configuration
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
sonar.typescript.file.suffixes=.ts,.tsx

# Test coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverageReportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/tests/**

# Security/Code Smells
sonar.issues.include.internalKey=*
sonar.core.codeCoveragePlugin=jacoco

# Performance
sonar.analysis.detectedci=true
sonar.analysis.ci.vendor=GitHub Actions

# Duplication settings
sonar.cpd.exclusions=**/node_modules/**,**/dist/**,**/build/**

# Code smells - set thresholds
sonar.projectBaseDir=.
sonar.working.directory=.scannerwork

# Language settings
sonar.language=js,ts

# File encoding
sonar.sourceEncoding=UTF-8

# Timeouts
sonar.core.serverBaseURL=http://localhost:9000
sonar.projectDescription=GoWithSally - Women-only ride-hailing platform

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
